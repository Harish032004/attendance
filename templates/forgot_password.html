<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/glassmorphic.css') }}">
    <style>
      /* ==================== FORGOT PASSWORD PAGE STYLES ==================== */
/* Matching your brand colors: #0F9D8A (Teal), #7ED957 (Green) */

.forgot-container {
    max-width: 400px;
    margin: 50px auto;
    padding: 30px;
    background: #FFFFFF;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 8px 24px rgba(15,157,138,0.15);
    border: 1px solid rgba(15,157,138,0.2);
}

.forgot-container h2 {
    color: #0F9D8A;
    font-size: 28px;
    margin-bottom: 10px;
    font-weight: 600;
}

.forgot-container p {
    color: #6c757d;
    font-size: 14px;
    margin-bottom: 25px;
}

.form-group {
    margin-bottom: 20px;
    text-align: left;
}

.form-group label {
    display: block;
    margin-bottom: 6px;
    color: #0B6E63;
    font-size: 14px;
    font-weight: 600;
}

.form-group input {
    width: 100%;
    padding: 12px 15px;
    background: #F8F9FA;
    border: 1px solid rgba(15,157,138,0.3);
    border-radius: 10px;
    color: #2C3E50;
    font-size: 14px;
    transition: all 0.3s ease;
}

.form-group input:focus {
    outline: none;
    border-color: #0F9D8A;
    box-shadow: 0 0 0 3px rgba(15,157,138,0.2);
    background: #FFFFFF;
}

.form-group input::placeholder {
    color: #adb5bd;
    opacity: 0.8;
}

/* Message styles */
.message {
    margin: 15px 0;
    padding: 12px 15px;
    border-radius: 10px;
    display: none;
    font-size: 14px;
    font-weight: 500;
    text-align: center;
}

.message.error {
    background: rgba(220,53,69,0.1);
    color: #dc3545;
    border: 1px solid rgba(220,53,69,0.3);
    display: block;
}

.message.success {
    background: rgba(40,167,69,0.1);
    color: #28a745;
    border: 1px solid rgba(40,167,69,0.3);
    display: block;
}

.message.warning {
    background: rgba(255,193,7,0.1);
    color: #ffc107;
    border: 1px solid rgba(255,193,7,0.3);
    display: block;
}

/* Button styling */
.forgot-container .glass-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #0F9D8A, #7ED957);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    margin: 10px 0;
    box-shadow: 0 4px 15px rgba(15,157,138,0.3);
}

.forgot-container .glass-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(15,157,138,0.4);
}

.forgot-container .glass-btn:active {
    transform: translateY(0);
}

/* Back to login link */
.forgot-container a {
    display: inline-block;
    margin-top: 15px;
    color: #0F9D8A;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.3s ease;
}

.forgot-container a:hover {
    color: #7ED957;
    text-decoration: underline;
}

/* Loading state for button */
.forgot-container .glass-btn.loading {
    position: relative;
    color: transparent;
    pointer-events: none;
}

.forgot-container .glass-btn.loading::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 20px;
    height: 20px;
    border: 2px solid white;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    transform: translate(-50%, -50%);
}

@keyframes spin {
    to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* Responsive design */
@media (max-width: 480px) {
    .forgot-container {
        margin: 30px 15px;
        padding: 25px 20px;
    }
    
    .forgot-container h2 {
        font-size: 24px;
    }
    
    .forgot-container p {
        font-size: 13px;
    }
    
    .form-group input {
        padding: 10px 12px;
    }
    
    .forgot-container .glass-btn {
        padding: 12px;
        font-size: 15px;
    }
}

@media (max-width: 360px) {
    .forgot-container {
        padding: 20px 15px;
    }
    
    .forgot-container h2 {
        font-size: 22px;
    }
    
    .form-group label {
        font-size: 13px;
    }
    
    .form-group input {
        padding: 8px 10px;
        font-size: 13px;
    }
}

/* Dark mode support (optional) */
@media (prefers-color-scheme: dark) {
    .forgot-container {
        background: #1a1a1a;
    }
    
    .forgot-container h2 {
        color: #7ED957;
    }
    
    .form-group label {
        color: #E8F8F5;
    }
    
    .form-group input {
        background: #2d2d2d;
        color: #ffffff;
        border-color: rgba(126,217,87,0.3);
    }
    
    .form-group input:focus {
        background: #333333;
    }
}
    </style>
</head>
<body>
    <div class="forgot-container">
        <h2>Forgot Password?</h2>
        <p style="color: var(--text-secondary); margin-bottom: 30px;">
            Enter your Employee ID and Email to reset password
        </p>

        <form id="forgotForm">
            <div class="form-group">
                <label>Employee ID</label>
                <input type="text" id="employeeId" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>

            <div id="message" class="message"></div>

            <button type="submit" class="glass-btn primary" style="width: 100%; margin-top: 20px;">
                Verify & Continue
            </button>
        </form>

        <a href="/login" style="display: block; margin-top: 20px; color: var(--text-secondary);">
            ← Back to Login
        </a>
    </div>

 <script>
document.getElementById('forgotForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    // Fix: Use correct IDs - employeeId (not employee_id)
    const employeeId = document.getElementById('employeeId').value.trim();
    const email = document.getElementById('email').value.trim();
    
    console.log('Submitting:', { employeeId, email }); // Debug log
    
    // Show loading state
    const submitBtn = this.querySelector('button[type="submit"]');
    const originalText = submitBtn.innerHTML;
    submitBtn.innerHTML = 'Verifying...';
    submitBtn.disabled = true;
    
    // Clear previous message
    const messageDiv = document.getElementById('message');
    messageDiv.className = 'message';
    messageDiv.style.display = 'none';
    
    fetch('/forgot-password', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            employee_id: employeeId,  // Send as employee_id to match backend
            email: email
        })
    })
    .then(response => response.json())
    .then(data => {
        console.log('Response:', data); // Debug log
        
        if (data.success) {
            // Show success message
            messageDiv.className = 'message success';
            messageDiv.textContent = data.message;
            messageDiv.style.display = 'block';
            
            // Redirect to reset password page
            setTimeout(() => {
                window.location.href = data.redirect;
            }, 1500);
        } else {
            // Show error message
            messageDiv.className = 'message error';
            messageDiv.textContent = data.message;
            messageDiv.style.display = 'block';
            
            // Reset button
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }
    })
    .catch(error => {
        console.error('Error:', error);
        messageDiv.className = 'message error';
        messageDiv.textContent = 'An error occurred. Please try again.';
        messageDiv.style.display = 'block';
        
        // Reset button
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
    });
});

// Clear message when user starts typing
document.getElementById('employeeId').addEventListener('input', function() {
    document.getElementById('message').style.display = 'none';
});

document.getElementById('email').addEventListener('input', function() {
    document.getElementById('message').style.display = 'none';
});
</script>


</body>
</html>
