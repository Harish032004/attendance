<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/glassmorphic.css') }}">
    <style>
        .reset-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: var(--glass-bg);
            border-radius: 24px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-primary);
        }
        .message {
            margin: 15px 0;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        .message.error {
            background: rgba(244,67,54,0.1);
            color: #f44336;
            display: block;
        }
        .message.success {
            background: rgba(76,175,80,0.1);
            color: #4caf50;
            display: block;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <h2>Reset Password</h2>
        <p style="color: var(--text-secondary); margin-bottom: 30px;">
            Enter your new password for Employee ID: <strong>{{ emp_id }}</strong>
        </p>

        <form id="resetForm">
            <input type="hidden" id="empId" value="{{ emp_id }}">
            
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" required>
            </div>

            <div id="message" class="message"></div>

            <button type="submit" class="glass-btn primary" style="width: 100%; margin-top: 20px;">
                Reset Password
            </button>
        </form>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const empId = document.getElementById('empId').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');
            const submitBtn = document.querySelector('button[type="submit"]');
            
            // Validation
            if (!newPassword || !confirmPassword) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Please fill all fields';
                return;
            }
            
            if (newPassword !== confirmPassword) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Passwords do not match';
                return;
            }
            
            if (newPassword.length < 6) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Password must be at least 6 characters';
                return;
            }
            
            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';
            
            try {
                const response = await fetch('/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        emp_id: empId,
                        new_password: newPassword,
                        confirm_password: confirmPassword
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ Password reset successful! Redirecting...';
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.message;
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reset Password';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Network error. Please try again.';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
