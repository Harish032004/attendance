        </div>

        <!-- Live Date & Time -->
        <div class="datetime-container">
            <div id="current-date" class="date"></div>
            <div id="current-time" class="time"></div>
        </div>

        {% if wifi_error %}
        <!-- WiFi Error Message -->
        <div class="error-container">
            <div class="wifi-error-icon">📶</div>
            <h2 class="wifi-error-title">Please connect to Office WiFi</h2>
            <p class="wifi-error-message">This attendance system is only accessible from the office network.</p>
        </div>
        {% else %}
        <!-- Main Attendance Form -->
        <div class="attendance-card">
            <h2 class="card-title">Mark Your Attendance</h2>
            
            <!-- Employee ID Input -->
            <div class="input-group">
                <label for="employee-id" class="input-label">Employee ID</label>
                <input type="text" id="employee-id" class="form-input" placeholder="Enter your Employee ID" autocomplete="off">
                <div id="id-validation-message" class="validation-message"></div>
            </div>

            <!-- Employee Name Display (Auto-populated) -->
            <div id="employee-info" class="employee-info" style="display: none;">
                <div class="employee-name-label">Employee Name</div>
                <div id="employee-name" class="employee-name"></div>
            </div>

            <!-- Mark Attendance Button -->
           <button onclick="markAttendance(); setTimeout(() => location.reload(), 1000)">
    Mark Attendance
</button>

            <!-- Message Display -->
            <div id="message-container" class="message-container"></div>
        </div>

        <!-- Success Animation Overlay -->
        <div id="success-overlay" class="success-overlay" style="display: none;">
            <div class="success-animation">
                <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                    <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
                    <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                </svg>
                <div class="success-message">Attendance Marked!</div>
            </div>
        </div>

        <!-- Today's Status (Optional) -->
        <div id="today-status" class="today-status" style="display: none;"></div>
        {% endif %}
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
