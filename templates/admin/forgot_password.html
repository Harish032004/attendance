<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Forgot Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/glassmorphic.css') }}">
  <style>
    body {
        background: linear-gradient(135deg, #0F9D8A 0%, #7ED957 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        margin: 0;
        padding: 16px;
        position: relative;
        overflow-x: hidden;
    }

    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: 
            radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 0%, transparent 30%),
            radial-gradient(circle at 80% 70%, rgba(255,255,255,0.1) 0%, transparent 30%);
        pointer-events: none;
        z-index: 0;
    }

    .container {
        max-width: 400px;
        width: 100%;
        position: relative;
        z-index: 1;
        animation: slideUp 0.5s ease;
    }

    .card {
        background: #FFFFFF;
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 8px 32px rgba(15,157,138,0.2);
        border: 1px solid rgba(15,157,138,0.15);
        transition: transform 0.3s ease;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 40px rgba(15,157,138,0.3);
    }

    h2 {
        color: #0F9D8A;
        margin-bottom: 8px;
        text-align: center;
        font-size: 28px;
        font-weight: 600;
    }

    .subtitle {
        color: #6c757d;
        text-align: center;
        margin-bottom: 25px;
        font-size: 14px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        color: #0B6E63;
        font-weight: 600;
        font-size: 14px;
    }

    .input-wrapper {
        position: relative;
    }

    input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #FFD700 !important;
        border-radius: 10px;
        font-size: 15px;
        transition: all 0.3s ease;
        box-sizing: border-box;
        background: #FFFFFF;
        color: #2C3E50;
    }

    input:focus {
        outline: none;
        border-color: #FFA500 !important;
        box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
    }

    input::placeholder {
        color: #adb5bd;
        opacity: 0.8;
    }

    /* Fix autofill background */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0 30px white inset !important;
        -webkit-text-fill-color: #2C3E50 !important;
        box-shadow: 0 0 0 30px white inset !important;
        border: 2px solid #FFD700 !important;
    }

    .toggle-password {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #FFD700;
        font-size: 18px;
        cursor: pointer;
        padding: 5px;
        transition: all 0.3s ease;
        z-index: 2;
    }

    .toggle-password:hover {
        color: #FFA500;
        transform: translateY(-50%) scale(1.1);
    }

    button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #0F9D8A, #7ED957);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(15,157,138,0.3);
    }

    button::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255,255,255,0.2);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
    }

    button:hover::before {
        width: 300px;
        height: 300px;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(15,157,138,0.4);
    }

    button:active {
        transform: translateY(0);
    }

    button:disabled {
        background: #a0aec0;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
    }

    button:disabled::before {
        display: none;
    }

    /* Loading state */
    button.loading {
        color: transparent;
        pointer-events: none;
    }

    button.loading::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 20px;
        height: 20px;
        border: 2px solid white;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        transform: translate(-50%, -50%);
    }

    @keyframes spin {
        to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .message {
        margin: 15px 0;
        padding: 12px 15px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 500;
        display: none;
        text-align: center;
    }

    .message.error {
        background: rgba(220,53,69,0.1);
        color: #dc3545;
        border: 1px solid rgba(220,53,69,0.3);
        display: block;
    }

    .message.success {
        background: rgba(40,167,69,0.1);
        color: #28a745;
        border: 1px solid rgba(40,167,69,0.3);
        display: block;
    }

    .message.warning {
        background: rgba(255,193,7,0.1);
        color: #ffc107;
        border: 1px solid rgba(255,193,7,0.3);
        display: block;
    }

    .message.info {
        background: rgba(15,157,138,0.1);
        color: #0F9D8A;
        border: 1px solid rgba(15,157,138,0.3);
        display: block;
    }

    .back-link {
        text-align: center;
        margin-top: 20px;
    }

    .back-link a {
        color: #0F9D8A;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.3s ease;
    }

    .back-link a:hover {
        color: #7ED957;
        text-decoration: underline;
    }

    /* Password strength indicator (if needed) */
    .password-strength {
        height: 5px;
        border-radius: 3px;
        margin-top: 8px;
        background: #e9ecef;
        overflow: hidden;
        position: relative;
    }

    .password-strength::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        transition: width 0.3s ease;
    }

    .strength-weak::before {
        background: #dc3545;
        width: 33%;
    }

    .strength-medium::before {
        background: #ffc107;
        width: 66%;
    }

    .strength-strong::before {
        background: #28a745;
        width: 100%;
    }

    /* Animations */
    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Responsive Design */
    @media (max-width: 480px) {
        .card {
            padding: 25px 20px;
        }

        h2 {
            font-size: 24px;
        }

        .subtitle {
            font-size: 13px;
            margin-bottom: 20px;
        }

        input {
            padding: 10px 12px;
            font-size: 14px;
            border-width: 1.5px !important;
        }

        button {
            padding: 12px;
            font-size: 15px;
        }

        .message {
            font-size: 13px;
            padding: 10px;
        }

        .back-link a {
            font-size: 13px;
        }
    }

    @media (max-width: 360px) {
        .card {
            padding: 20px 15px;
        }

        h2 {
            font-size: 22px;
        }

        .subtitle {
            font-size: 12px;
        }

        input {
            padding: 8px 10px;
        }

        button {
            padding: 10px;
            font-size: 14px;
        }
    }

    /* Touch device optimizations */
    @media (hover: none) and (pointer: coarse) {
        button {
            min-height: 44px;
        }
        
        input {
            font-size: 16px; /* Prevents zoom on iOS */
        }
    }

    /* Print styles */
    @media print {
        body {
            background: white;
        }
        
        .card {
            box-shadow: none;
            border: 1px solid #ddd;
        }
        
        button {
            display: none;
        }
    }
</style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>Admin Forgot Password</h2>
            <p class="subtitle">Enter your Admin ID and Email to reset password</p>

            <form id="forgotForm">
                <div class="form-group">
                    <label>Admin ID</label>
                    <input type="text" id="adminId" placeholder="ADMIN001" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="admin@company.com" required>
                </div>

                <div id="message" class="message"></div>

                <button type="submit" id="submitBtn">
                    Verify & Continue
                </button>
            </form>

            <div class="back-link">
                <a href="/admin/login">← Back to Admin Login</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const adminId = document.getElementById('adminId').value.trim();
            const email = document.getElementById('email').value.trim();
            const messageDiv = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');
            
            // Clear previous messages
            messageDiv.style.display = 'none';
            messageDiv.className = 'message';
            
            // Validation
            if (!adminId || !email) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Please fill all fields';
                return;
            }
            
            // Show loading
            submitBtn.disabled = true;
            submitBtn.textContent = 'Verifying...';
            
            try {
                console.log('Sending request...'); // Debug
                
                const response = await fetch('/admin/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        admin_id: adminId,
                        email: email
                    })
                });
                
                console.log('Response status:', response.status); // Debug
                
                const data = await response.json();
                console.log('Response data:', data); // Debug
                
                if (data.success) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ Verified! Redirecting...';
                    
                    // FIX: Use the redirect URL from response
                    if (data.redirect) {
                        setTimeout(() => {
                            window.location.href = data.redirect;
                        }, 1500);
                    } else {
                        // Fallback
                        setTimeout(() => {
                            window.location.href = '/admin/reset-password?admin=' + adminId;
                        }, 1500);
                    }
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.message || 'Verification failed';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Verify & Continue';
                }
            } catch (error) {
                console.error('Error:', error);
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Network error. Please try again.';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Verify & Continue';
            }
        });
    </script>
</body>
</html>
